<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password | Bellevue Youth Debate</title>
<link rel="icon" href="assets/logo.webp">
<link rel="stylesheet" href="css/styles.css">
<style>
  body { background: var(--ink); }
  .panel { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card-wrap { width: 100%; max-width: 400px; }
  .brand-mark { justify-content: center; margin-bottom: 20px; }
  .brand-mark-name { color: #fff; font-size: 18px; }
</style>
</head>
<body>
  <div class="panel">
    <div class="card-wrap">
      <div class="brand-mark">
        <img src="assets/logo.webp" alt="Bellevue Youth Debate seal">
        <div class="brand-mark-name">Bellevue Youth Debate</div>
      </div>
      <div class="card" id="card">
        <h2>Set a new password</h2>
        <form id="resetForm">
          <div class="field">
            <label for="newPassword">New password</label>
            <input type="password" id="newPassword" required minlength="8" autocomplete="new-password">
            <div class="hint">At least 8 characters.</div>
          </div>
          <div class="field">
            <label for="confirmPassword">Confirm password</label>
            <input type="password" id="confirmPassword" required minlength="8" autocomplete="new-password">
          </div>
          <button class="btn btn-primary btn-block" type="submit">Set new password</button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    const card = document.getElementById('card');
    if (!token) {
      card.innerHTML = '<h2>Missing reset link</h2><p class="text-muted">This page needs a reset token from your email link. <a href="index.html">Back to login</a></p>';
    } else {
      document.getElementById('resetForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const pw = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;
        if (pw !== confirm) { BYD.toast("Passwords don't match.", 'error'); return; }
        const btn = e.target.querySelector('button[type=submit]');
        btn.disabled = true; btn.textContent = 'Saving\u2026';
        try {
          await BYD.call('resetPassword', { token: token, newPassword: pw });
          card.innerHTML = '<h2>Password updated</h2><p class="text-muted">You can log in with your new password now.</p><a class="btn btn-primary btn-block" href="index.html">Go to login</a>';
        } catch (err) {
          BYD.toast(BYD.errorMessage(err), 'error');
          btn.disabled = false; btn.textContent = 'Set new password';
        }
      });
    }
  </script>
</body>
</html>
